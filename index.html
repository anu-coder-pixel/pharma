<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacology MCQ Quiz – FMGE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20243a;
    --accent: #4f9cf9;
    --accent2: #a78bfa;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #8892a4;
    --border: #2d3150;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  /* HEADER */
  .hero {
    background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #16213e 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% -20%, rgba(79,156,249,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    background: linear-gradient(90deg, #4f9cf9, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .hero p { color: var(--muted); font-size: 0.95rem; }
  .stats-bar {
    display: flex; justify-content: center; gap: 32px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

  /* SECTION TABS */
  .section-nav {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .sec-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px; border-radius: 50px;
    cursor: pointer; font-size: 0.78rem; font-family: inherit;
    transition: all .2s;
  }
  .sec-btn.active, .sec-btn:hover {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  /* MAIN */
  .container { max-width: 880px; margin: 0 auto; padding: 24px 16px 80px; }

  /* SECTION HEADER */
  .section-header {
    margin: 28px 0 16px;
    padding: 10px 18px;
    background: linear-gradient(90deg, rgba(79,156,249,0.15), transparent);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
  }
  .section-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: var(--accent);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    transition: border-color .3s;
  }
  .q-card.answered { border-color: var(--border); }
  .q-num {
    font-size: 0.72rem; font-weight: 600; color: var(--accent2);
    text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;
  }
  .q-text {
    font-size: 0.97rem; line-height: 1.6; color: var(--text);
    margin-bottom: 14px; font-weight: 400;
  }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media(max-width:560px){ .options { grid-template-columns: 1fr; } }

  .opt-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    cursor: pointer;
    text-align: left;
    transition: all .18s;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .opt-btn:hover:not(:disabled) {
    background: rgba(79,156,249,0.1);
    border-color: var(--accent);
    color: #fff;
  }
  .opt-btn.selected { border-color: var(--accent); background: rgba(79,156,249,0.15); }
  .opt-btn.correct  { border-color: var(--correct)!important; background: rgba(34,197,94,0.15)!important; color: #86efac!important; }
  .opt-btn.wrong    { border-color: var(--wrong)!important;   background: rgba(239,68,68,0.15)!important; color: #fca5a5!important; }
  .opt-btn:disabled { cursor: default; }
  .opt-letter {
    font-weight: 700; color: var(--muted); min-width: 16px; font-size: 0.82rem; margin-top: 1px;
  }

  .check-btn {
    margin-top: 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border: none; border-radius: 8px;
    color: #fff; font-family: inherit;
    font-size: 0.85rem; font-weight: 600;
    padding: 8px 20px; cursor: pointer;
    transition: opacity .2s;
  }
  .check-btn:hover { opacity: 0.88; }
  .check-btn:disabled { opacity: 0.4; cursor: default; }

  .result-msg {
    margin-top: 10px; font-size: 0.85rem; padding: 8px 12px;
    border-radius: 8px; display: none;
  }
  .result-msg.show { display: block; }
  .result-msg.correct-msg { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
  .result-msg.wrong-msg   { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

  /* SCORE PANEL */
  .score-panel {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 18px;
    font-size: 0.85rem; z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .score-panel span { color: var(--accent); font-weight: 700; }

  /* SCROLL TOP */
  .to-top {
    position: fixed; bottom: 70px; right: 16px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 50%; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; color: var(--muted);
    transition: all .2s; z-index: 200;
  }
  .to-top:hover { background: var(--accent); color: #fff; }
</style>
</head>

// ─── STATE ───
const state = {}; // qIndex -> {selected, checked}
let attempted = 0, correct = 0, wrong = 0;

// ─── BUILD SECTIONS ───
const sections = [...new Set(QUESTIONS.map(q => q.s))];

// Nav
const nav = document.getElementById('section-nav');
sections.forEach((sec, i) => {
  const btn = document.createElement('button');
  btn.className = 'sec-btn' + (i === 0 ? ' active' : '');
  btn.textContent = sec;
  btn.onclick = () => {
    document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const el = document.getElementById('sec-' + i);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  nav.appendChild(btn);
});

// Quiz render
const container = document.getElementById('quiz-container');
let secIdx = -1;
QUESTIONS.forEach((q, idx) => {
  const sIdx = sections.indexOf(q.s);
  if (sIdx !== secIdx) {
    secIdx = sIdx;
    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.id = 'sec-' + sIdx;
    sh.innerHTML = `<h2>${q.s}</h2>`;
    container.appendChild(sh);
  }

  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = 'q-' + idx;

  const letters = ['A','B','C','D'];
  const opts = q.o.map((opt, oi) =>
    `<button class="opt-btn" data-idx="${idx}" data-opt="${oi}" onclick="selectOpt(${idx},${oi})">
      <span class="opt-letter">${letters[oi]}.</span>${opt}
    </button>`
  ).join('');

  card.innerHTML = `
    <div class="q-num">Q${q.n}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts-${idx}">${opts}</div>
    <button class="check-btn" id="chk-${idx}" onclick="checkAnswer(${idx})" disabled>Check Answer</button>
    <div class="result-msg" id="res-${idx}"></div>
  `;
  container.appendChild(card);
});

function selectOpt(idx, opt) {
  if (state[idx]?.checked) return;
  state[idx] = { selected: opt, checked: false };
  document.querySelectorAll(`#opts-${idx} .opt-btn`).forEach((b, i) => {
    b.classList.toggle('selected', i === opt);
  });
  document.getElementById('chk-' + idx).disabled = false;
}

function checkAnswer(idx) {
  if (state[idx]?.checked) return;
  const q = QUESTIONS[idx];
  const sel = state[idx]?.selected;
  if (sel === undefined) return;

  state[idx].checked = true;
  attempted++;

  const btns = document.querySelectorAll(`#opts-${idx} .opt-btn`);
  btns.forEach((b, i) => {
    b.disabled = true;
    b.classList.remove('selected');
    if (i === q.a) b.classList.add('correct');
    if (i === sel && sel !== q.a) b.classList.add('wrong');
  });

  const res = document.getElementById('res-' + idx);
  const chk = document.getElementById('chk-' + idx);
  chk.disabled = true;

  if (sel === q.a) {
    correct++;
    res.textContent = '✓ Correct!';
    res.className = 'result-msg show correct-msg';
  } else {
    wrong++;
    res.textContent = `✗ Incorrect. Correct answer: ${['A','B','C','D'][q.a]}. ${q.o[q.a]}`;
    res.className = 'result-msg show wrong-msg';
  }

  updateStats();
}

function updateStats() {
  document.getElementById('attempted-q').textContent = attempted;
  document.getElementById('correct-q').textContent = correct;
  document.getElementById('wrong-q').textContent = wrong;
  const pct = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
  document.getElementById('score-pct').textContent = pct + '%';
}
